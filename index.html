<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java Backend Learning Resources</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f11;
    --surface: #1a1a1f;
    --surface2: #222228;
    --border: #2e2e38;
    --text: #e8e8f0;
    --muted: #7a7a8c;
    --hint: #4a4a5a;
    --must: #ff6b6b;
    --must-bg: #2a1515;
    --should: #f0a500;
    --should-bg: #241a00;
    --nice: #4ade80;
    --nice-bg: #0a1f0f;
    --accent: #7c6aff;
    --accent-bg: #15102a;
    --new: #00d4aa;
    --new-bg: #001a14;
    --link: #5b9cf6;
  }
 
  * { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }
 
  .page {
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }
 
  .header {
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }
 
  .header h1 {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
 
  .header p {
    font-size: 22px;
    font-weight: 300;
    color: var(--text);
    letter-spacing: -0.02em;
  }
 
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 1.5rem;
  }
 
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
 
  .stat-num {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }
 
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
 
  .bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 10px;
    overflow: hidden;
  }
 
  .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
  }
 
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    align-items: center;
  }
 
  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
 
  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--hint);
    font-size: 16px;
    pointer-events: none;
  }
 
  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 8px 12px 8px 34px;
    outline: none;
    transition: border-color 0.2s;
  }
 
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--hint); }
 
  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
 
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 5px 12px;
    transition: all 0.15s;
  }
 
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
 
  .section { margin-bottom: 1.25rem; }
 
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 6px;
    cursor: pointer;
    user-select: none;
  }
 
  .section-head:hover .section-name { color: var(--text); }
 
  .section-left { display: flex; align-items: center; gap: 10px; }
 
  .section-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: color 0.15s;
  }
 
  .section-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--hint);
    background: var(--surface2);
    padding: 2px 7px;
    border-radius: 10px;
  }
 
  .section-toggle {
    font-size: 11px;
    color: var(--hint);
    font-family: 'DM Mono', monospace;
  }
 
  .resource-list { display: flex; flex-direction: column; }
 
  .resource-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 8px;
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.12s;
  }
 
  .resource-row:hover { background: var(--surface); }
  .resource-row.done { opacity: 0.4; }
 
  .check {
    width: 15px;
    height: 15px;
    border-radius: 4px;
    border: 1.5px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
 
  .resource-row.done .check {
    background: var(--nice);
    border-color: var(--nice);
  }
 
  .check-mark {
    display: none;
    width: 7px;
    height: 5px;
    border-left: 1.5px solid #0a1f0f;
    border-bottom: 1.5px solid #0a1f0f;
    transform: rotate(-45deg) translate(1px, -1px);
  }
 
  .resource-row.done .check-mark { display: block; }
 
  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
 
  .badge-must { background: var(--must-bg); color: var(--must); }
  .badge-should { background: var(--should-bg); color: var(--should); }
  .badge-nice { background: var(--nice-bg); color: var(--nice); }
 
  .resource-title {
    flex: 1;
    font-size: 13px;
    color: var(--text);
    transition: color 0.12s;
  }
 
  .resource-row.done .resource-title {
    text-decoration: line-through;
    color: var(--hint);
  }
 
  .new-tag {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--new-bg);
    color: var(--new);
    border: 1px solid var(--new);
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }
 
  .open-link {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--link);
    padding: 2px 8px;
    border-radius: 5px;
    border: 1px solid transparent;
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    text-decoration: none;
    transition: all 0.12s;
  }
 
  .open-link:hover {
    border-color: var(--link);
    background: rgba(91,156,246,0.08);
  }
 
  .empty {
    text-align: center;
    padding: 3rem;
    color: var(--hint);
    font-size: 13px;
    font-family: 'DM Mono', monospace;
  }
 
  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .header p { font-size: 18px; }
  }
</style>
</head>

      <button class="filter-btn" onclick="setFilter('pending',this)">Unread</button>
      <button class="filter-btn" onclick="setFilter('done',this)">Done</button>
      <button class="filter-btn" onclick="setFilter('new',this)">New ✦</button>

  </div>
 
  <div id="content"></div>
</div>

const KEY = 'jb_resources_v1';
let done = new Set();
try { done = new Set(JSON.parse(localStorage.getItem(KEY) || '[]')); } catch(e) {}
let filter = 'all';
let collapsed = new Set();
 
function save() { try { localStorage.setItem(KEY, JSON.stringify([...done])); } catch(e) {} }
 
function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
 
function toggle(t) {
  done.has(t) ? done.delete(t) : done.add(t);
  save(); render();
}
 
function toggleSection(cat) {
  collapsed.has(cat) ? collapsed.delete(cat) : collapsed.add(cat);
  render();
}
 
function renderStats() {
  const total = DATA.reduce((a,c) => a + c.items.length, 0);
  const doneCount = done.size;
  const must = DATA.reduce((a,c) => a + c.items.filter(i => i.p==='must').length, 0);
  const mustDone = DATA.reduce((a,c) => a + c.items.filter(i => i.p==='must' && done.has(i.t)).length, 0);
  const newCount = DATA.reduce((a,c) => a + c.items.filter(i => i.n).length, 0);
  const pct = total ? Math.round(doneCount/total*100) : 0;
  const mpct = must ? Math.round(mustDone/must*100) : 0;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-num">${doneCount}/${total}</div><div class="stat-label">Completed</div><div class="bar"><div class="bar-fill" style="width:${pct}%;background:#4ade80"></div></div></div>
    <div class="stat"><div class="stat-num">${pct}%</div><div class="stat-label">Progress</div><div class="bar"><div class="bar-fill" style="width:${pct}%;background:#7c6aff"></div></div></div>
    <div class="stat"><div class="stat-num">${mustDone}/${must}</div><div class="stat-label">Must reads</div><div class="bar"><div class="bar-fill" style="width:${mpct}%;background:#ff6b6b"></div></div></div>
    <div class="stat"><div class="stat-num">${newCount}</div><div class="stat-label">New this session</div><div class="bar"><div class="bar-fill" style="width:100%;background:#00d4aa"></div></div></div>
  `;
}
 
function render() {
  const q = document.getElementById('search').value.toLowerCase();
  renderStats();
  let html = '';
  DATA.forEach(sec => {
    const items = sec.items.filter(item => {
      if (q && !item.t.toLowerCase().includes(q)) return false;
      if (filter === 'must') return item.p === 'must';
      if (filter === 'should') return item.p === 'should';
      if (filter === 'nice') return item.p === 'nice';
      if (filter === 'pending') return !done.has(item.t);
      if (filter === 'done') return done.has(item.t);
      if (filter === 'new') return item.n;
      return true;
    });
    if (!items.length) return;
    const isCollapsed = collapsed.has(sec.cat);
    const doneC = items.filter(i => done.has(i.t)).length;
    const sc = sec.cat.replace(/'/g,"\\'");
    html += `<div class="section">
      <div class="section-head" onclick="toggleSection('${sc}')">
        <div class="section-left">
          <span class="section-name">${sec.cat}</span>
          <span class="section-count">${doneC}/${items.length}</span>
        </div>
        <span class="section-toggle">${isCollapsed ? '[ + ]' : '[ − ]'}</span>
      </div>`;
    if (!isCollapsed) {
      html += '<div class="resource-list">';
      items.forEach(item => {
        const isDone = done.has(item.t);
        const badgeMap = { must: 'must', should: 'should', nice: 'nice' };
        const labelMap = { must: 'M', should: 'S', nice: 'N' };
        const st = item.t.replace(/'/g,"\\'");
        html += `<div class="resource-row ${isDone ? 'done' : ''}" onclick="toggle('${st}')">
          <div class="check"><div class="check-mark"></div></div>
          <div class="badge badge-${badgeMap[item.p]}">${labelMap[item.p]}</div>
          <span class="resource-title">${item.t}</span>
          ${item.n ? '<span class="new-tag">NEW</span>' : ''}
          <a class="open-link" href="${item.u}" target="_blank" onclick="event.stopPropagation()">open →</a>
        </div>`;
      });
      html += '</div>';
    }
    html += '</div>';
  });
  if (!html) html = '<div class="empty">// no results found</div>';
  document.getElementById('content').innerHTML = html;
}
 
render();
</script>
